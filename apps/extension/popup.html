<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0b0f19;
      color: #f1f5f9;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h2 {
      font-size: 16px;
      font-weight: 800;
      margin: 0;
      background: linear-gradient(to right, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .label {
      font-size: 10px;
      font-weight: 700;
      color: #818cf8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      display: block;
    }
    .form-group {
      margin-bottom: 12px;
    }
    input[type="text"], textarea, select {
      width: 100%;
      box-sizing: border-box;
      background-color: #020617;
      border: 1px border solid #1e293b;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: #6366f1;
    }
    textarea {
      resize: none;
      height: 80px;
    }
    .btn {
      width: 100%;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }
    .btn:hover {
      background-color: #4338ca;
    }
    .btn:disabled {
      background-color: #1e293b;
      color: #64748b;
      cursor: not-allowed;
    }
    .message {
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
      font-weight: 500;
    }
    .success { color: #10b981; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
    </svg>
    <h2>CollabPM Clipper</h2>
  </div>

  <div class="form-group">
    <label class="label">Task Title</label>
    <input type="text" id="title" placeholder="Loading page title...">
  </div>

  <div class="form-group">
    <label class="label">Task Description</label>
    <textarea id="description" placeholder="Selected text will prefill here..."></textarea>
  </div>

  <div class="form-group">
    <label class="label">Select Board</label>
    <select id="boardSelect">
      <option value="">Fetching boards...</option>
    </select>
  </div>

  <div class="form-group">
    <label class="label">Select Column</label>
    <select id="listSelect">
      <option value="">Choose board first...</option>
    </select>
  </div>

  <button id="clipBtn" class="btn" disabled>Clip to Board</button>

  <div id="statusMsg" class="message"></div>

  <script src="popup.js"></script>
</body>
</html>
